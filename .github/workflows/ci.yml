name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated/ in sync with codegen.py
        run: bash scripts/check-drift.sh
