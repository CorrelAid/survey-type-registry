name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check generated/ in sync with codegen.py
        run: bash scripts/check-drift.sh

  schematron-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - name: Build schematron-worker shadow jar
        run: bash scripts/build-worker.sh
      - name: Install registry test deps
        run: uv sync
      - name: Validate blessed DDI snapshots (XSD + schematron)
        run: uv run pytest tests/transformations/test_ddi_validation.py -v

  transformations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Checkout xlsform2lstsv into subdir
        uses: actions/checkout@v4
        with:
          repository: CorrelAid/xlsform2lstsv
          path: _xlsform2lstsv
          # TODO: pin to a tag once xlsform2lstsv consumes the registry
      - name: Build xlsform2lstsv
        working-directory: _xlsform2lstsv
        run: |
          npm ci
          npm run build
      - name: Install registry test deps
        run: uv sync
      - name: Run transformation tests
        env:
          XLSFORM2LSTSV_PATH: ${{ github.workspace }}/_xlsform2lstsv
        run: uv run pytest tests/transformations/ -m "not docker" -v
